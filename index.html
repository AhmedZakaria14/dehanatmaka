<body>
    <div id="root"></div>

    <!-- Global Navigation & Routing Fix -->
    <script>
        (function() {
            function updateLinks() {
                const links = document.querySelectorAll("a");
                links.forEach(link => {
                    const text = link.textContent.trim();
                    const href = link.getAttribute("href");
                    
                    // Fix Interior Paints link
                    if (text.includes("دهانات داخلية") || (href && (href === "/interior-paints" || href.includes("interior-paints.html")))) {
                        link.setAttribute("href", "interior-paints.html");
                    }
                    // Fix Kitchen Renovation link
                    if (text.includes("تجديد المطابخ") || text.includes("Kitchen Renovation") || (href && (href === "/kitchen-renovation" || href.includes("kitchen-renovation.html")))) {
                        link.setAttribute("href", "kitchen-renovation.html");
                    }
                    // Fix Exterior Paints link
                    if (text.includes("دهانات خارجية") || (href && (href === "/exterior-paints" || href.includes("exterior-paints.html")))) {
                        link.setAttribute("href", "exterior-paints.html");
                    }
                    // Fix Epoxy link
                    if (text.includes("إيبوكسي") || text.includes("Epoxy") || (href && (href === "/epoxy" || href.includes("epoxy.html")))) {
                        link.setAttribute("href", "epoxy.html");
                    }
                });
            }

            // Run on load and on DOM changes (for React)
            updateLinks();
            const observer = new MutationObserver(updateLinks);
            observer.observe(document.body, { childList: true, subtree: true });

            // Intercept clicks to ensure navigation
            document.addEventListener("click", function(e) {
                const link = e.target.closest("a");
                if (link) {
                    const text = link.textContent.trim();
                    const href = link.getAttribute("href");
                    
                    if (text.includes("دهانات داخلية") || (href && href.includes("interior-paints.html"))) {
                        window.location.href = "interior-paints.html";
                        e.preventDefault();
                        e.stopPropagation();
                    } else if (text.includes("تجديد المطابخ") || (href && href.includes("kitchen-renovation.html"))) {
                        window.location.href = "kitchen-renovation.html";
                        e.preventDefault();
                        e.stopPropagation();
                    } else if (text.includes("دهانات خارجية") || (href && href.includes("exterior-paints.html"))) {
                        window.location.href = "exterior-paints.html";
                        e.preventDefault();
                        e.stopPropagation();
                    } else if (text.includes("إيبوكسي") || (href && href.includes("epoxy.html"))) {
                        window.location.href = "epoxy.html";
                        e.preventDefault();
                        e.stopPropagation();
                    }
                }
            }, true);
        })();
    </script>

    <!-- Contact Modal Structure -->
    <style>
        #contactModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999999;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            backdrop-filter: blur(5px);
        }
        #contactModal.active { display: flex; }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 1.5rem;
            padding: 2rem;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: right;
            color: #000;
        }
        .close-modal {
            position: absolute;
            top: 1rem;
            left: 1rem;
            font-size: 2rem;
            cursor: pointer;
            color: #94a3b8;
        }
        .modal-input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            font-family: 'Cairo', sans-serif;
            background: #f8fafc;
        }
        .modal-btn {
            background: #2563eb;
            color: #fff;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
        }
        .modal-btn:hover { background: #1d4ed8; transform: translateY(-2px); }
    </style>

    <div id="contactModal" onclick="if(event.target == this) closeContactModal()">
        <div class="modal-content">
            <span class="close-modal" onclick="closeContactModal()">&times;</span>
            <h2 class="text-2xl font-black mb-2">تواصل معنا الآن</h2>
            <p class="text-slate-500 mb-6">يسعدنا خدمتك، اترك بياناتك وسنتصل بك فوراً</p>
            
            <label class="block font-bold mb-1">الاسم الكريم</label>
            <input type="text" id="modalName" class="modal-input" placeholder="مثال: أحمد محمد">
            
            <label class="block font-bold mb-1">نوع الخدمة</label>
            <select id="modalService" class="modal-input">
                <option value="دهانات داخلية">دهانات داخلية</option>
                <option value="دهانات خارجية">دهانات خارجية</option>
                <option value="تجديد مطابخ">تجديد مطابخ</option>
                <option value="إيبوكسي">إيبوكسي</option>
            </select>
            
            <label class="block font-bold mb-1">رسالتك</label>
            <textarea id="modalMsg" class="modal-input" rows="3" placeholder="اكتب تفاصيل طلبك هنا..."></textarea>
            
            <button onclick="sendModalWhatsApp()" class="modal-btn">إرسال الطلب عبر واتساب</button>
        </div>
    </div>

    <script>
        function openContactModal() {
            document.getElementById('contactModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeContactModal() {
            document.getElementById('contactModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        function sendModalWhatsApp() {
            const name = document.getElementById('modalName').value;
            const service = document.getElementById('modalService').value;
            const msg = document.getElementById('modalMsg').value;
            const text = `طلب تواصل جديد:\n*الاسم:* ${name || 'غير محدد'}\n*الخدمة:* ${service}\n*الرسالة:* ${msg || 'لا توجد'}`;
            window.open(`https://wa.me/966560703844?text=${encodeURIComponent(text)}`, '_blank');
            closeContactModal();
        }

        // Bind contact links
        document.addEventListener("click", function(e) {
            const anchor = e.target.closest("a");
            if (anchor && anchor.getAttribute("href") && anchor.getAttribute("href").includes("contact")) {
                e.preventDefault();
                openContactModal();
            }
        });
    </script>
