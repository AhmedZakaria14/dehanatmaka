  <body>
    <div id="root"></div>
    <script>
      // Clean and direct navigation handling
      document.addEventListener('click', function(e) {
        const a = e.target.closest('a');
        if (a && a.href) {
          const url = new URL(a.href);
          if (url.origin === window.location.origin) {
            if (url.pathname.includes('interior-paints')) {
              e.preventDefault();
              window.location.href = '/interior-paints.html';
            } else if (url.pathname.includes('kitchen-renovation')) {
              e.preventDefault();
              window.location.href = '/kitchen-renovation.html';
            } else if (url.pathname.includes('exterior-paints')) {
              e.preventDefault();
              window.location.href = '/exterior-paints.html';
            } else if (url.pathname.includes('epoxy')) {
              e.preventDefault();
              window.location.href = '/epoxy.html';
            }
          }
        }
      }, true);
    </script>
  </body>
